name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to Main Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 将生成的 HTML 和 Assets 复制到根目录（不删除源码）
          cp public/*.html ./
          cp -r public/assets/ ./assets/ 2>/dev/null || mkdir -p assets/
          cp -r public/posts/ ./posts-html/ 2>/dev/null || true 
          # 注意：为了不混淆 .md 和 .html，文章 HTML 放在 posts-html 或者直接在 index 里用相对路径链接
          # 但 build.mjs 生成的路径是 posts/xxx.html。
          # 我们直接覆盖。
          
          # 同步 public 内容到根目录，但保留 .md 文件和源码配置
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='*.md' --exclude='package*.json' --exclude='build.mjs' public/ ./
          
          # 如果 posts 里有 md，不要删掉。rsync 可能会因为 public 里没有 md 而不动 md 文件，这是好的。
          # 但 public 里的 posts/*.html 必须进入 posts/*.html。
          mkdir -p posts/
          cp public/posts/*.html posts/ 2>/dev/null || true
          
          git add -A
          
          # 只有当有变更时才提交
          if git diff --staged --quiet; then
            echo "✅ Site is up to date."
          else
            git commit -m "🚀 Auto-deploy site updates"
            git push origin main
            echo "✅ Site deployed successfully!"
          fi
