name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create config.json
        run: echo '{ "basePath": "/happy-daily-website/" }' > config.json

      - name: Build site
        run: npm run build

      - name: Deploy
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='*.md' --exclude='package*.json' --exclude='build.mjs' --exclude='config.json' --exclude='data/' public/ ./
          git add -A
          if git diff --staged --quiet; then
            echo "Site is up to date."
          else
            git commit -m "Auto-deploy site updates"
            git push origin main
            echo "Site deployed successfully!"
          fi
